<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />

    <script type="module" src="script.js"></script>
  </head>
  <body>
    <div class="calculator-container">
      <div class="display">0</div>

      <div class="buttons-container">
        <div class="first-row-of-buttons">
          <button class="all-clear blue" value="ac">AC</button>
          <button class="delete blue" value="del">DEL</button>
          <button class="percentage blue" value="%">%</button>
          <button class="division blue operator" value="/">/</button>
        </div>
        <div class="second-row-of-buttons">
          <button class="seven digit" value="7">7</button>
          <button class="eight digit" value="8">8</button>
          <button class="nine digit" value="9">9</button>
          <button class="multiplacation-btn blue operator" value="*">*</button>
        </div>
        <div class="third-row-of-buttons">
          <button class="four-btn digit" value="4">4</button>
          <button class="five-btn digit" value="5">5</button>
          <button class="six-btn digit" value="6">6</button>
          <button class="subtraction-btn blue operator" value="-">-</button>
        </div>
        <div class="fourth-row-of-buttons">
          <button class="one-btn digit" value="1">1</button>
          <button class="two-btn digit" value="2">2</button>
          <button class="three-btn digit" value="3">3</button>
          <button class="addition-btn blue operator" value="+">+</button>
        </div>
        <div class="fifth-row-of-buttons">
          <button class="zero-btn digit" value="0">0</button>
          <button class="double-zero-btn digit" value="00">00</button>
          <button class="decimal-point-btn" value=".">.</button>
          <button class="equal-btn blue" value="=">=</button>
        </div>
      </div>
    </div>
  </body>
</html>
